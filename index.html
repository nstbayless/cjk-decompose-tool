<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Decomposition</title>
<style>
  /* Bundled fallback fonts covering every character the decomposition trees
     can display (incl. CJK Ext A/B and the CJK Strokes block, which most
     system fonts lack). Listed AFTER the system CJK fonts in each stack, so
     they are only used for glyphs the system cannot render.
     Subset from BabelStone Han and Jigmo — see fonts/. */
  @font-face {
    font-family: "DecompHan";
    src: url("fonts/decomp-bsh.woff2") format("woff2");
    font-display: swap;
  }
  @font-face {
    font-family: "DecompHanExtB";
    src: url("fonts/decomp-jigmo2.woff2") format("woff2");
    font-display: swap;
  }
  @font-face {
    font-family: "DecompHanExtC";
    src: url("fonts/decomp-jigmo3.woff2") format("woff2");
    font-display: swap;
  }
  /* Unencoded components (BabelStone IDS {NN} tokens) mapped to Private Use
     Area codepoints, rendered by a subset of BabelStone Han PUA. Restricted
     to the PUA range and listed FIRST in each stack so a system font with
     unrelated PUA glyphs can never shadow it. */
  @font-face {
    font-family: "DecompHanPUA";
    src: url("fonts/decomp-bsh-pua.woff2") format("woff2");
    unicode-range: U+E080-F8DF;
    font-display: swap;
  }

  :root {
    --cjk-fonts: "DecompHanPUA", system-ui,
                 "Hiragino Sans", "Yu Gothic", "Meiryo",
                 "PingFang SC", "PingFang TC", "Microsoft YaHei",
                 "Noto Sans CJK JP", "Noto Sans JP",
                 "DecompHan", "DecompHanExtB", "DecompHanExtC", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 640px;
    margin: 2rem auto;
    padding: 0 1rem;
    color: #1a1a1a;
    background: #fafafa;
  }

  h1 {
    font-size: 1.4rem;
    margin-bottom: 1.2rem;
  }

  #char-input {
    display: block;
    width: 100%;
    height: 5rem;
    font-size: 3rem;
    font-family: var(--cjk-fonts);
    text-align: center;
    border: 2px solid #ccc;
    border-radius: 6px;
    outline: none;
    background: #fff;
  }

  #char-input:focus {
    border-color: #666;
  }

  /* When a decomposition is shown, the input field and the root box below
     read as one unit: square off the field's bottom corners so the root box
     (which squares its top corners and overlaps the shared border) joins it. */
  #char-input.joined {
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }

  .btn-row {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
    align-items: center;
  }

  button {
    padding: 0.5rem 1.2rem;
    font-size: 0.95rem;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
  }

  button:hover { background: #eee; }
  button:active { background: #ddd; }

  #btn-gear {
    padding: 0.5rem 0.55rem;
    font-size: 1.05rem;
    line-height: 1;
    color: #555;
    border-color: #bbb;
  }
  /* The current-setting code next to the gear icon: smaller and faded. */
  #btn-gear .gear-code {
    font-size: 0.7em;
    opacity: 0.5;
  }

  #output {
    margin-top: 1.2rem;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  /* Empty output (the normal case once data has loaded) adds no gap, so the
     input field and root box can sit flush. */
  #output:empty { margin: 0; }

  .loading {
    color: #888;
    font-style: italic;
    font-family: system-ui, sans-serif;
  }

  /* ── Decomposition boxes ── */

  #decomp {
    display: flex;
    flex-direction: column;
  }

  /* Connector strip between rows: dotted stub from the selected parent,
     horizontal branch, and feeders down into each child box. Segments are
     positioned by drawConnectors(). */
  .decomp-conn {
    position: relative;
    height: 2.2rem;
  }

  .decomp-conn-seg {
    position: absolute;
  }

  .decomp-row {
    display: flex;
    gap: 0.5rem;
  }

  .decomp-box {
    position: relative;
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.25rem;
    background: #fff;
    border: 2px solid #ccc;
    border-radius: 6px;
    padding: 0.45rem 0.5rem;
    font-size: 0.85rem;
    line-height: 1.35;
    text-align: center;
    overflow-wrap: break-word;
    user-select: text;
  }

  /* Root box: joins the input field above it — square top corners and pull
     up so its top border overlaps the field's bottom border (one divider). */
  .decomp-box.decomp-root {
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    margin-top: -2px;
  }

  /* Leaf boxes (not further decomposable, excluding the root header) carry a
     subtle blue tint to set them apart from expandable boxes. */
  .decomp-box:not(.clickable):not(.decomp-root) {
    background: #eef3fb;
  }

  .decomp-box.clickable { cursor: pointer; }
  .decomp-box.clickable:hover { border-color: #999; }
  .decomp-box.clickable:active { background: #f0f0f0; }

  .decomp-box.selected {
    border-color: #f0880d;
    background: #fff7ee;
  }

  /* Nudge selected boxes downward (~70% of a gloss-line cap height) to mark
     the selected path. The root box stays put — it carries no glyph. */
  .decomp-box.selected:not(.decomp-root) {
    transform: translateY(0.6rem);
  }
  .decomp-box.selected.clickable:hover { border-color: #d07400; }

  /* In a row where a sibling has been selected (drilled into), fade the
     options that weren't chosen. Rows with no selection — the deepest,
     not-yet-expanded options — are unaffected. Hover restores a faded box. */
  .decomp-row:has(> .decomp-box.selected) > .decomp-box:not(.selected) {
    opacity: 0.55;
    transition: opacity 0.12s;
  }
  .decomp-row:has(> .decomp-box.selected) > .decomp-box:not(.selected):hover {
    opacity: 1;
  }

  /* Expandable (non-leaf) boxes: a small tab protruding below, centered —
     the counterpart of the leaf corner chip. Built as a square rotated 45°
     whose two lower edges continue the box border and whose fill matches the
     box background, so it reads as part of the box outline (and picks up the
     hover / selected border colours). Its upper half sits inside the box. */
  .decomp-box.clickable::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    width: 13px;
    height: 13px;
    transform: translateX(-50%) rotate(45deg);
    background: #fff;
    border-right: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
  }
  .decomp-box.clickable:hover::after { border-color: #999; }
  .decomp-box.selected.clickable::after {
    background: #fff7ee;
    border-color: #f0880d;
  }
  .decomp-box.selected.clickable:hover::after { border-color: #d07400; }

  .decomp-glyph {
    font-family: var(--cjk-fonts);
    font-size: 2.4rem;
    line-height: 1.15;
  }

  .decomp-reading {
    color: #888;
    margin-top: 0.1rem;
  }

  .decomp-note {
    font-style: italic;
    color: #999;
  }

  /* Radical number: a large, faint sans-serif watermark in the top-right
     corner behind the box content (which is lifted above it via z-index). */
  .rad-watermark {
    position: absolute;
    top: 0.1rem;
    right: 0.35rem;
    z-index: 0;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: 700;
    font-size: 2.5rem;
    line-height: 1;
    color: #2b3a5b;
    opacity: 0.3;
    pointer-events: none;
    user-select: none;
  }
  .decomp-box > *:not(.rad-watermark):not(.rad-clover) { position: relative; z-index: 1; }

  /* Clover marking the sort-radical: the one component a dictionary files the
     parent character under. Small, top-left, above the box content. */
  .rad-clover {
    position: absolute;
    top: 0.15rem;
    left: 0.3rem;
    z-index: 2;
    font-size: 0.9rem;
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  /* Leaf boxes (not further decomposable) get a diagonal chip cut out of
     the bottom-right corner: a page-background triangle covers the corner
     (border included), and a diagonal stroke redraws the cut edge. */
  .decomp-box:not(.clickable)::before {
    content: "";
    position: absolute;
    right: -2px;
    bottom: -2px;
    width: 18px;
    height: 18px;
    background: #fafafa;
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
  }

  .decomp-box:not(.clickable)::after {
    content: "";
    position: absolute;
    right: -6px;
    bottom: 6px;
    width: 26px;
    height: 2px;
    background: #ccc;
    transform: rotate(-45deg);
  }

  /* ── Settings dialog ── */

  dialog {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 0;
    min-width: 300px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  }

  dialog::backdrop {
    background: rgba(0,0,0,0.25);
  }

  .dlg-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.9rem 1rem 0.7rem;
    border-bottom: 1px solid #eee;
  }

  .dlg-header strong {
    font-size: 1rem;
  }

  .dlg-x {
    background: none;
    border: none;
    font-size: 1.2rem;
    color: #888;
    padding: 0 0.2rem;
    line-height: 1;
    cursor: pointer;
  }
  .dlg-x:hover { color: #333; background: none; }
  .dlg-x:active { background: none; }

  .dlg-body {
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .dlg-fieldset {
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 0.6rem 0.8rem 0.7rem;
  }

  .dlg-fieldset legend {
    font-size: 0.8rem;
    color: #666;
    padding: 0 0.3rem;
  }

  .dlg-fieldset label {
    display: block;
    font-size: 0.95rem;
    cursor: pointer;
    padding: 0.15rem 0;
  }

  .dlg-fieldset input[type="radio"] {
    margin-right: 0.4rem;
  }

  .dlg-level-wrap label {
    display: block;
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 0.3rem;
  }

  #dlg-level {
    width: 100%;
    font-size: 0.95rem;
    padding: 0.35rem 0.5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Character Decomposition &nbsp;<a href="about.html" style="font-size:0.8rem;font-weight:normal;">About</a></h1>

<div class="btn-row">
  <button id="btn-clear">Clear</button>
  <button id="btn-random">Random</button>
  <button id="btn-gear" title="Random settings">&#9881;</button>
</div>

<input id="char-input" type="text" maxlength="2" autocomplete="off" spellcheck="false" placeholder="...">

<div id="output"></div>
<div id="decomp"></div>

<!-- Settings dialog -->
<dialog id="settings-dialog">
  <div class="dlg-header">
    <strong>Random settings</strong>
    <button class="dlg-x" id="dlg-close" aria-label="Close">&times;</button>
  </div>
  <div class="dlg-body">
    <fieldset class="dlg-fieldset">
      <legend>Language</legend>
      <label><input type="radio" name="dlg-cjk" value="j"> Japanese (kanji)</label>
      <label><input type="radio" name="dlg-cjk" value="simp"> Chinese simplified</label>
      <label><input type="radio" name="dlg-cjk" value="trad"> Chinese traditional</label>
    </fieldset>
    <div class="dlg-level-wrap">
      <label for="dlg-level">Level / Grade</label>
      <select id="dlg-level"></select>
    </div>
  </div>
</dialog>

<script>
"use strict";

const BINARY = new Set("⿰⿱⿴⿵⿶⿷⿸⿹⿺⿻");
const TRINARY = new Set("⿲⿳");

let DATA = null;
let ALL_RADICALS = null;
let CANONICAL = null;

// ── Settings state ──

let currentCJK = "trad";    // 'j' | 'simp' | 'trad'
let currentLevel = "tocflc"; // URL-param-style key

const DEFAULT_LEVEL = { j: "joyos", simp: "nhsk9", trad: "tocflc" };

// Map URL-param level key → data.json array key
const LEVEL_KEY = {
  n5: "jlpt_n5", n4: "jlpt_n4", n3: "jlpt_n3", n2: "jlpt_n2", n1: "jlpt_n1",
  joyo1: "joyo_1", joyo2: "joyo_2", joyo3: "joyo_3",
  joyo4: "joyo_4", joyo5: "joyo_5", joyo6: "joyo_6", joyos: "joyo_s",
  hsk1: "hsk_1", hsk2: "hsk_2", hsk3: "hsk_3",
  hsk4: "hsk_4", hsk5: "hsk_5", hsk6: "hsk_6",
  nhsk1: "nhsk_1", nhsk2: "nhsk_2", nhsk3: "nhsk_3",
  nhsk4: "nhsk_4", nhsk5: "nhsk_5", nhsk6: "nhsk_6",
  nhsk7: "nhsk_7", nhsk8: "nhsk_8", nhsk9: "nhsk_9",
  tocfla: "tocfl_a", tocflb: "tocfl_b", tocflc: "tocfl_c",
};

// Short "country-item" tag shown on the gear button, e.g. jp-N5, jp-J3 (Jōyō
// grade), zh-H6 (old HSK), zh-N9 (New HSK), tw-C (TOCFL band).
const COUNTRY = { j: "jp", simp: "zh", trad: "tw" };

function levelCode(level) {
  let m;
  if ((m = level.match(/^n([1-5])$/)))    return "N" + m[1];   // JLPT
  if ((m = level.match(/^joyo([1-6])$/))) return "J" + m[1];   // Jōyō grade
  if (level === "joyos")                  return "JS";         // Jōyō secondary
  if ((m = level.match(/^hsk([1-6])$/)))  return "H" + m[1];   // old HSK
  if ((m = level.match(/^nhsk([1-9])$/))) return "N" + m[1];   // New HSK
  if ((m = level.match(/^tocfl([abc])$/))) return m[1].toUpperCase();  // TOCFL
  return level;
}

function updateGearLabel() {
  const cc = COUNTRY[currentCJK] || currentCJK;
  const gear = document.getElementById("btn-gear");
  gear.textContent = "⚙ ";
  const code = document.createElement("span");
  code.className = "gear-code";
  code.textContent = "(" + cc + "-" + levelCode(currentLevel) + ")";
  gear.appendChild(code);
}

// Dropdown options per language  [{ group, options: [{value, label}] }]
const LEVEL_OPTIONS = {
  j: [
    { group: "JLPT", options: [
      { value: "n5",    label: "JLPT N5 (80)" },
      { value: "n4",    label: "JLPT N4 (cumul. 250)" },
      { value: "n3",    label: "JLPT N3 (cumul. 619)" },
      { value: "n2",    label: "JLPT N2 (cumul. 987)" },
      { value: "n1",    label: "JLPT N1 (all J\u014dy\u014d, 2136)" },
    ]},
    { group: "J\u014dy\u014d grade", options: [
      { value: "joyo1", label: "Grade 1 (80)" },
      { value: "joyo2", label: "Grade 2 (cumul. 240)" },
      { value: "joyo3", label: "Grade 3 (cumul. 440)" },
      { value: "joyo4", label: "Grade 4 (cumul. 642)" },
      { value: "joyo5", label: "Grade 5 (cumul. 835)" },
      { value: "joyo6", label: "Grade 6 (cumul. 1026)" },
      { value: "joyos", label: "Secondary / all J\u014dy\u014d (2136)" },
    ]},
  ],
  simp: [
    { group: "HSK (2010)", options: [
      { value: "hsk1", label: "HSK 1" },
      { value: "hsk2", label: "HSK 2 (cumul.)" },
      { value: "hsk3", label: "HSK 3 (cumul.)" },
      { value: "hsk4", label: "HSK 4 (cumul.)" },
      { value: "hsk5", label: "HSK 5 (cumul.)" },
      { value: "hsk6", label: "HSK 6 (cumul.)" },
    ]},
    { group: "New HSK (2021)", options: [
      { value: "nhsk1", label: "New HSK 1" },
      { value: "nhsk2", label: "New HSK 2 (cumul.)" },
      { value: "nhsk3", label: "New HSK 3 (cumul.)" },
      { value: "nhsk4", label: "New HSK 4 (cumul.)" },
      { value: "nhsk5", label: "New HSK 5 (cumul.)" },
      { value: "nhsk6", label: "New HSK 6 (cumul.)" },
      { value: "nhsk7", label: "New HSK 7 (cumul.)" },
      { value: "nhsk8", label: "New HSK 8 (cumul.)" },
      { value: "nhsk9", label: "New HSK 9 (cumul.)" },
    ]},
  ],
  trad: [
    { group: "TOCFL", options: [
      { value: "tocfla", label: "Band A" },
      { value: "tocflb", label: "Band B (cumul.)" },
      { value: "tocflc", label: "Band C (cumul.)" },
    ]},
  ],
};

// ── Data loading ──

async function loadData() {
  const out = document.getElementById("output");
  out.className = "loading";
  out.textContent = "Loading data...";
  const resp = await fetch("data.json", { cache: "no-cache" });
  DATA = await resp.json();
  // Tolerate a stale cached data.json missing newer maps.
  for (const k of ["ids", "ids_simp", "ids_trad", "glosses",
                   "readingsJa", "readingsZh"]) {
    if (!DATA[k]) DATA[k] = {};
  }
  ALL_RADICALS = new Set(DATA.allRadicals || []);
  CANONICAL = new Set(DATA.canonical || []);
  out.className = "";
  out.textContent = "";
}

// ── IDS parsing (mirrors cj.py) ──

function parseIDS(s, pos) {
  if (pos === undefined) pos = 0;
  if (pos >= s.length) throw new Error("unexpected end");

  const cp = s.codePointAt(pos);
  const c = String.fromCodePoint(cp);
  const charLen = c.length;
  const nextPos = pos + charLen;

  if (BINARY.has(c)) {
    const [a, posA] = parseIDS(s, nextPos);
    const [b, posB] = parseIDS(s, posA);
    return [[c, a, b], posB];
  }
  if (TRINARY.has(c)) {
    const [a, posA] = parseIDS(s, nextPos);
    const [b, posB] = parseIDS(s, posA);
    const [d, posD] = parseIDS(s, posB);
    return [[c, a, b, d], posD];
  }
  return [c, nextPos];
}

function leaves(node) {
  if (typeof node === "string") return [node];
  const result = [];
  for (let i = 1; i < node.length; i++) result.push(...leaves(node[i]));
  return result;
}

// IDS lookup honoring the language setting: base data is the Japanese
// (J-source-priority) pick; ids_simp/ids_trad hold only the entries whose
// regional decomposition differs.
function idsOf(char) {
  if (currentCJK === "simp" && DATA.ids_simp[char] !== undefined)
    return DATA.ids_simp[char];
  if (currentCJK === "trad" && DATA.ids_trad[char] !== undefined)
    return DATA.ids_trad[char];
  return DATA.ids[char];
}

function shouldDecompose(char) {
  const idsStr = idsOf(char);
  if (!idsStr) return false;
  if (!ALL_RADICALS.has(char)) return true;
  try {
    const [parsed] = parseIDS(idsStr, 0);
    const children = leaves(parsed);
    return children.every(c => CANONICAL.has(c));
  } catch (e) {
    return false;
  }
}

// ── Box rendering ──

// Chars whose component row is open; path[0] is the input char.
let path = [];

function currentChar() {
  return [...document.getElementById("char-input").value.trim()][0] || "";
}

function directComponents(char) {
  try {
    const [parsed] = parseIDS(idsOf(char), 0);
    return leaves(parsed);
  } catch (e) {
    return [];
  }
}

function isPUA(char) {
  const cp = char.codePointAt(0);
  return cp >= 0xE000 && cp <= 0xF8FF;
}

function readingFor(char) {
  const map = currentCJK === "j" ? DATA.readingsJa : DATA.readingsZh;
  const raw = map[char] || "";
  // Readings are stored as whitespace-separated tokens; show them
  // separated by " / " instead.
  return raw.split(/\s+/).filter(Boolean).join(" / ");
}

// Drop redundant "; Kangxi radical NN" / "; radical number NN" phrases (the
// number is shown as a watermark, so the phrase adds nothing).
function cleanGloss(gloss) {
  return gloss.replace(/[;,]?\s*(?:[Kk]angxi radical|radical number)\s*[0-9]*/g, "")
              .trim();
}

// Determine a box's radical number (for the watermark) and cleaned display
// text. Handles two shapes: canonical radicals labelled "NN: name — gloss",
// and variant component forms (忄 扌 氵 飠 …) whose Unihan definition names
// their radical (e.g. "eat, food; radical number 184"). Null if neither.
function radicalInfo(char, gloss) {
  if (ALL_RADICALS.has(char)) {
    const m = gloss.match(/^([0-9]+):\s*([\s\S]*)$/);
    if (m) {
      let name = m[2], text = m[2];
      const dash = m[2].indexOf(" — ");
      if (dash >= 0) { name = m[2].slice(0, dash); text = m[2].slice(dash + 3); }
      return { num: m[1], text: cleanGloss(text) || name };
    }
  }
  const p = gloss.match(/(?:[Kk]angxi radical|radical number)\s*([0-9]+)/);
  if (p) return { num: p[1], text: cleanGloss(gloss) };
  // Fall back to kRSUnicode: residual 0 means this char IS a radical form
  // (𠆢 = 9.0, 纟 = 120.0) even when no gloss or radical table names it.
  const r = rsOf(char);
  if (r && r.res === 0) {
    return { num: String(r.num),
             text: cleanGloss(gloss) || radicalName(r.num) };
  }
  return null;
}

// Kangxi radical number -> English name, derived from the canonical radical
// labels ("85: water — ..."). Built once on first use.
let RADICAL_NAMES = null;
function radicalName(num) {
  if (!RADICAL_NAMES) {
    RADICAL_NAMES = {};
    for (const ch of DATA.allRadicals) {
      const m = (DATA.glosses[ch] || "").match(/^([0-9]+):\s*([^—]+?)\s*(?:—|$)/);
      if (m && !(m[1] in RADICAL_NAMES)) RADICAL_NAMES[m[1]] = m[2];
    }
  }
  return RADICAL_NAMES[String(num)] || "";
}

// kRSUnicode radical-stroke lookup: {num, res} or null. res===0 means the
// character IS a radical form (氵 = 85.0); otherwise it is filed under that
// radical (河 = 85.5, under radical 85 水).
function rsOf(char) {
  const v = DATA.rs && DATA.rs[char];
  if (!v) return null;
  const dot = v.indexOf(".");
  return { num: parseInt(v.slice(0, dot), 10),
           res: parseInt(v.slice(dot + 1), 10) };
}

// True if `char` or any character in its decomposition subtree is the radical
// form of radical `R` (used to locate a sort-radical buried below the top row).
function subtreeHasRadical(char, R, seen) {
  const r = rsOf(char);
  if (r && r.num === R && r.res === 0) return true;
  if (seen.has(char)) return false;
  seen.add(char);
  const idsStr = idsOf(char);
  if (!idsStr) return false;
  try {
    return leaves(parseIDS(idsStr, 0)[0])
      .some(c => subtreeHasRadical(c, R, seen));
  } catch (e) {
    return false;
  }
}

// Index into directComponents(parent) of the component that is the parent's
// sort-radical, or -1. Prefer a direct component that IS the radical form;
// otherwise the direct component whose subtree contains it.
function sortRadicalIndex(parent) {
  const pr = rsOf(parent);
  if (!pr) return -1;
  const R = pr.num;
  const comps = directComponents(parent);
  for (let i = 0; i < comps.length; i++) {
    const r = rsOf(comps[i]);
    if (r && r.num === R && r.res === 0) return i;
  }
  for (let i = 0; i < comps.length; i++) {
    if (subtreeHasRadical(comps[i], R, new Set())) return i;
  }
  return -1;
}

function makeBox(char, depth, isRoot, isSortRadical) {
  const box = document.createElement("div");
  box.className = "decomp-box";
  if (isRoot) box.classList.add("decomp-root");
  if (path[depth] === char) box.classList.add("selected");

  if (isSortRadical) {
    const clover = document.createElement("span");
    clover.className = "rad-clover";
    // Abstract quatrefoil (stylized clover), monochrome via currentColor —
    // marks the parent's sort-radical without a colored emoji glyph.
    clover.innerHTML =
      '<svg viewBox="0 0 16 16" width="1em" height="1em" aria-hidden="true">' +
      '<g fill="none" stroke="currentColor" stroke-width="1.3">' +
      '<circle cx="8" cy="4.4" r="2.9"/>' +
      '<circle cx="8" cy="11.6" r="2.9"/>' +
      '<circle cx="4.4" cy="8" r="2.9"/>' +
      '<circle cx="11.6" cy="8" r="2.9"/>' +
      '</g></svg>';
    clover.title = "sort radical";
    box.appendChild(clover);
  }

  if (!isRoot) {
    const glyph = document.createElement("span");
    glyph.className = "decomp-glyph";
    glyph.textContent = char;
    box.appendChild(glyph);
  }

  const info = document.createElement("div");
  let gloss = DATA.glosses[char] || "";
  const rad = radicalInfo(char, gloss);
  if (rad) {
    gloss = rad.text;
    const wm = document.createElement("span");
    wm.className = "rad-watermark";
    wm.textContent = rad.num;
    box.appendChild(wm);
  } else {
    gloss = cleanGloss(gloss);
  }
  const reading = readingFor(char);
  if (isPUA(char)) {
    // Unencoded components carry the BabelStone header description as
    // their gloss ("top of 合") when the token table provides one.
    const note = document.createElement("div");
    note.className = "decomp-note";
    note.textContent = gloss || "unencoded component";
    info.appendChild(note);
  } else if (!gloss && !DATA.readingsJa[char] && !DATA.readingsZh[char]) {
    const note = document.createElement("div");
    note.className = "decomp-note";
    note.textContent = "meaningless component";
    info.appendChild(note);
  } else {
    if (gloss) {
      const g = document.createElement("div");
      g.className = "decomp-gloss";
      g.textContent = gloss;
      info.appendChild(g);
    }
    if (reading) {
      const r = document.createElement("div");
      r.className = "decomp-reading";
      r.textContent = reading;
      info.appendChild(r);
    }
  }
  if (info.childNodes.length) box.appendChild(info);

  if (shouldDecompose(char)) {
    box.classList.add("clickable");
    box.addEventListener("click", () => {
      // A "click" that actually completed a text selection (drag-release
      // inside the box) shouldn't navigate — let the selection stand.
      const sel = window.getSelection();
      if (sel && !sel.isCollapsed) return;
      const wasSelected = path[depth] === char;
      path = path.slice(0, depth);
      if (!wasSelected) path.push(char);
      render();
      syncURL(currentChar(), path.length > 0);
    });
  }
  return box;
}

// Truncate path at the first link that is invalid under the current
// language's decompositions (used when the language setting changes).
function validatePath() {
  for (let j = 0; j < path.length; j++) {
    const bad = !shouldDecompose(path[j]) ||
      (j > 0 && !directComponents(path[j - 1]).includes(path[j]));
    if (bad) { path = path.slice(0, j); return; }
  }
}

function render() {
  const decomp = document.getElementById("decomp");
  const input = document.getElementById("char-input");
  decomp.innerHTML = "";
  const ch = DATA ? currentChar() : "";
  if (!ch) { input.classList.remove("joined"); return; }
  // The root box renders flush beneath the input field as one unit.
  input.classList.add("joined");

  // Root box: gloss + readings for the input char (glyph is in the input).
  const rootRow = document.createElement("div");
  rootRow.className = "decomp-row";
  rootRow.appendChild(makeBox(ch, 0, true));
  decomp.appendChild(rootRow);

  // One row of component boxes per open char in the path, with a connector
  // strip between each row and the one above it.
  for (let depth = 0; depth < path.length; depth++) {
    const conn = document.createElement("div");
    conn.className = "decomp-conn";
    decomp.appendChild(conn);
    const row = document.createElement("div");
    row.className = "decomp-row";
    const comps = directComponents(path[depth]);
    const sri = sortRadicalIndex(path[depth]);
    comps.forEach((comp, i) => {
      row.appendChild(makeBox(comp, depth + 1, false, i === sri));
    });
    decomp.appendChild(row);
  }
  drawConnectors();
}

// Position the dotted hierarchy lines inside each connector strip: a stub
// down from the selected parent box, a horizontal branch, and a feeder down
// into each child box. Re-run on resize (positions are pixel-based).
function drawConnectors() {
  const GRAY = "2px dotted #bbb";
  const ORANGE = "2px dotted #f0880d";
  const TRI = 9; // protrusion of the expandable-box tab the stub emerges from

  document.querySelectorAll("#decomp .decomp-conn").forEach(conn => {
    conn.innerHTML = "";
    const base = conn.getBoundingClientRect();
    const centerX = el => {
      const r = el.getBoundingClientRect();
      return r.left + r.width / 2 - base.left;
    };
    const seg = style => {
      const d = document.createElement("div");
      d.className = "decomp-conn-seg";
      Object.assign(d.style, style);
      conn.appendChild(d);
    };

    const below = conn.nextElementSibling;
    if (!below) return;
    const kids = below.querySelectorAll(".decomp-box");
    if (!kids.length) return;

    const above = conn.previousElementSibling;
    const parent = above && (above.querySelector(".decomp-box.selected") ||
                             above.querySelector(".decomp-box"));
    if (!parent) return;

    // Stub starts below the parent's protruding triangle (parent may be
    // shifted down by the selected-path nudge); feeders end at each child's
    // actual top edge (the selected child sits lower than its siblings).
    const px = centerX(parent);
    const stubTop = parent.getBoundingClientRect().bottom - base.top + TRI - 3;
    const horizY = Math.max(stubTop + 4, base.height * 0.55);
    const selKid = [...kids].find(k => k.classList.contains("selected"));
    const centers = [...kids].map(centerX);
    const lo = Math.min(px, ...centers);
    const hi = Math.max(px, ...centers);

    seg({ left: (px - 1) + "px", top: stubTop + "px",
          height: Math.max(0, horizY - stubTop) + "px",
          borderLeft: selKid ? ORANGE : GRAY });
    seg({ left: (lo - 1) + "px", top: (horizY - 1) + "px",
          width: (hi - lo + 2) + "px", borderTop: GRAY });
    if (selKid) {
      // Overlay the parent→selected-child stretch of the branch in orange.
      const sx = centerX(selKid);
      seg({ left: (Math.min(px, sx) - 1) + "px", top: (horizY - 1) + "px",
            width: (Math.abs(sx - px) + 2) + "px", borderTop: ORANGE });
    }
    kids.forEach((kid, i) => {
      const kidTop = kid.getBoundingClientRect().top - base.top;
      seg({ left: (centers[i] - 1) + "px", top: horizY + "px",
            height: Math.max(0, kidTop - horizY) + "px",
            borderLeft: kid === selKid ? ORANGE : GRAY });
    });
  });
}

// ── URL sync ──

function syncURL(char, decomposed) {
  const url = new URL(window.location);
  url.searchParams.delete("c");
  url.searchParams.delete("d");
  if (char) url.searchParams.set(decomposed ? "d" : "c", char);
  url.searchParams.set("cjk", currentCJK);
  url.searchParams.set("l", currentLevel);
  history.replaceState(null, "", url);
}

function syncURLSettings() {
  const url = new URL(window.location);
  url.searchParams.set("cjk", currentCJK);
  url.searchParams.set("l", currentLevel);
  history.replaceState(null, "", url);
}

// ── Core actions ──

function toggleRoot() {
  if (!DATA) return;
  const ch = currentChar();
  if (!ch) return;
  path = path.length ? [] : (shouldDecompose(ch) ? [ch] : []);
  render();
  syncURL(ch, path.length > 0);
}

function pickRandom() {
  if (!DATA) return;
  const key = LEVEL_KEY[currentLevel];
  const list = key ? (DATA[key] || []) : [];
  if (!list.length) {
    document.getElementById("output").textContent =
      "(no data for this level yet — see about.md)";
    return;
  }
  const ch = list[Math.floor(Math.random() * list.length)];
  document.getElementById("char-input").value = ch;
  document.getElementById("output").textContent = "";
  path = [];
  render();
  syncURL(ch, false);
}

function clearInput() {
  const input = document.getElementById("char-input");
  input.value = "";
  document.getElementById("output").textContent = "";
  path = [];
  render();
  syncURL("", false);
  input.focus();
}

// ── Settings dialog ──

function populateLevelSelect(selectEl, cjk, selectedLevel) {
  selectEl.innerHTML = "";
  for (const group of LEVEL_OPTIONS[cjk]) {
    const og = document.createElement("optgroup");
    og.label = group.group;
    for (const opt of group.options) {
      const o = document.createElement("option");
      o.value = opt.value;
      o.textContent = opt.label;
      if (opt.value === selectedLevel) o.selected = true;
      og.appendChild(o);
    }
    selectEl.appendChild(og);
  }
}

function openSettings() {
  const dialog = document.getElementById("settings-dialog");
  const sel = document.getElementById("dlg-level");

  // Sync dialog state to current settings
  document.querySelector(`input[name="dlg-cjk"][value="${currentCJK}"]`).checked = true;
  populateLevelSelect(sel, currentCJK, currentLevel);

  dialog.showModal();
}

// ── URL init ──

let _autoDecompose = false;

function initFromURL() {
  const params = new URLSearchParams(window.location.search);

  // cjk param: j | simp | trad  (old 'c' → trad for backward compat)
  const cjkParam = params.get("cjk");
  if (cjkParam === "simp") currentCJK = "simp";
  else if (cjkParam === "trad" || cjkParam === "c") currentCJK = "trad";
  else if (cjkParam === "j") currentCJK = "j";
  else currentCJK = "trad";

  // l param
  const lParam = params.get("l");
  if (lParam && LEVEL_KEY[lParam] !== undefined) {
    currentLevel = lParam;
  } else {
    currentLevel = DEFAULT_LEVEL[currentCJK];
  }

  const d = params.get("d");
  const c = params.get("c");
  if (d) {
    document.getElementById("char-input").value = d;
    _autoDecompose = true;
  } else if (c) {
    document.getElementById("char-input").value = c;
  }
}

// ── Boot ──

document.addEventListener("DOMContentLoaded", async () => {
  initFromURL();
  updateGearLabel();

  document.getElementById("btn-random").addEventListener("click", pickRandom);
  document.getElementById("btn-clear").addEventListener("click", clearInput);
  document.getElementById("btn-gear").addEventListener("click", openSettings);
  document.getElementById("dlg-close").addEventListener("click", () => {
    document.getElementById("settings-dialog").close();
  });

  // Language radio change in dialog
  document.querySelectorAll('input[name="dlg-cjk"]').forEach(radio => {
    radio.addEventListener("change", () => {
      currentCJK = radio.value;
      currentLevel = DEFAULT_LEVEL[currentCJK];
      populateLevelSelect(document.getElementById("dlg-level"), currentCJK, currentLevel);
      updateGearLabel();
      syncURLSettings();
      if (DATA) validatePath();
      render();
    });
  });

  // Level select change in dialog
  document.getElementById("dlg-level").addEventListener("change", (e) => {
    currentLevel = e.target.value;
    updateGearLabel();
    syncURLSettings();
  });

  // Close dialog on backdrop click
  document.getElementById("settings-dialog").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) e.currentTarget.close();
  });

  const input = document.getElementById("char-input");
  input.addEventListener("input", () => {
    document.getElementById("output").textContent = "";
    path = [];
    render();
    syncURL(currentChar(), false);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); toggleRoot(); }
  });

  window.addEventListener("resize", drawConnectors);

  await loadData();
  if (_autoDecompose) {
    const ch = currentChar();
    if (ch && shouldDecompose(ch)) path = [ch];
  }
  render();
});
</script>
